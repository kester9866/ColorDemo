<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Aquacheck水体多项指标快速智能监测平台</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #e6f0f1, #d1e0e1);
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 40px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .h1 {
      margin: 0;
      color: #2c3e50;
      font-size: 2em;
      font-weight: bold;
    }

    .buttons-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      max-width: 800px;
      margin: 0 auto 40px;
    }

    .feature-btn {
      width: 200px;
      height: 200px;
      border-radius: 15px;
      border: none;
      background: #3498db;
      color: white;
      font-size: 1.5em;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feature-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .tp-btn {
      background: linear-gradient(to bottom, #3498db, #2980b9);
    }

    .tn-btn {
      background: linear-gradient(to bottom, #2ecc71, #27ae60);
    }

    .cod-btn {
      background: linear-gradient(to bottom, #e74c3c, #c0392b);
    }

    .footer {
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      font-size: 1em;
      color: #7f8c8d;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .description {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      margin: 0 auto 30px;
      max-width: 800px;
      text-align: left;
      line-height: 1.6;
    }

    .description h2 {
      color: #2c3e50;
      margin-top: 0;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1 class="h1">Aquacheck水体多项指标快速智能监测平台</h1>
  </div>

  <div class="description">
    <h2>平台介绍</h2>
    <p>本平台采用先进的图像色彩识别技术，通过智能比色法快速检测水体中的关键污染指标。用户只需使用手机拍摄检测完成的试剂盒，即可实时获取准确的水质分析结果与专业处理建议。</p>
    <p>平台目前支持总磷(TP)、总氮(TN)和化学需氧量(COD)三项核心指标的快速检测，适用于环保部门、水务企业、科研院所及个人用户。</p>
  </div>

  <div class="buttons-container">
    <button class="feature-btn tp-btn" onclick="goToTest('tp')">总磷检测</button>
    <button class="feature-btn tn-btn" onclick="goToTest('tn')">总氮检测</button>
    <button class="feature-btn cod-btn" onclick="goToTest('cod')">COD检测</button>
  </div>

  <div class="footer">
    <p>版权所有 © xxx 所有</p>
    <p>2026年 | 版本号：V1.0.0</p>
  </div>

  <script>
    function goToTest(indicator) {
      // 将检测指标存储在localStorage中，以便功能页获取
      localStorage.setItem('currentIndicator', indicator);

      // 跳转到功能页
      window.location.href = 'function.html';
    }
  </script>

</body>

</html>
